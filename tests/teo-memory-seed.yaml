    answer: |
      Ключевая модель ТЭО:
      Бесплатный убой → побочные продукты (кожа, желатин, кровяная мука) →
      прибыль 5,6 млрд руб. покрывает затраты на мясо 5,8 млрд руб.
      → себестоимость мяса для производителей стремится к нулю.
    mode: vector
    citations:
      - type: kpi
        source: docs/graphify-corpus/00-summary.md
        section: Ключевая модель

  - query: "чёрная икра белуга"
    answer: |
      Рыбоводство: 70 000 белуг, 20 т икры/год.
      Экспорт: чёрная икра в рамках кластера 10,2 млрд руб. (СНГ, Азия, ОАЭ).
    mode: hybrid
    citations:
      - type: kpi
        block: рыбоводство
        source: docs/graphify-corpus/00-summary.md

  - query: "как бесплатный убой связан с желатином и кожей?"
    answer: |
      Цепочка (baseline ТЭО):
      1. Производители мяса сдают скот на убой бесплатно.
      2. Убойный цех получает шкуры, кровь, субпродукты.
      3. Кожевенный завод и завод халяльного желатина перерабатывают сырьё.
      4. Прибыль от побочных продуктов (~5,6 млрд) покрывает затраты на мясо (~5,8 млрд).
    mode: graph
    citations:
      - type: graph_edge
        source: docs/graphify-corpus/00-summary.md
        section: Ключевая модель

  - query: "path убой желатин"
    answer: |
      Типичный path в графе ТЭО:
      Убойный цех → побочные продукты (шкуры, кровь) → завод халяльного желатина / кожевенный завод → экспорт.
    mode: graph
    citations:
      - type: graph_path
        source: docs/graphify-corpus/01-vvedenie-i-resume.md

  - query: "комбикорм подсолнечник соя животноводство"
    answer: |
      Вертикаль ТЭО: поля (подсолнечник, соя) → масложировой комбинат (масло, шрот) →
      комбикормовый завод → корм для КРС/МРС, кролиководства и птицы (в корпусе).
      Бобовые (соя, горох) — основа белковой части комбикорма.
    mode: hybrid
    citations:
      - type: chunk
        source: docs/graphify-corpus/03-proizvodstvo-i-tehnologii.md

  - query: "риски биологические ветеринарные меры снижения"
    answer: |
      Биологические и ветеринарные риски (06-vyvody-i-riski):
      — болезни поголовья, эпизоотии;
      меры: постоянный ветеринарный и фитосанитарный контроль,
      карантин, вакцинация, биобезопасность на фермах и в рыбоводстве.
    mode: hybrid
    citations:
      - type: chunk
        source: docs/graphify-corpus/06-vyvody-i-riski.md
        section: "12.3. Риски"
