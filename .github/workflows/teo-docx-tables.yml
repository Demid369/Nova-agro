name: TEO docx tables

on:
  pull_request:
    paths:
      - "docs/1.ТЭО_МОЯ МЕЧТА.docx"
      - "docs/teo-tables/**"
      - "docs/graphify-corpus/**"
      - "scripts/extract-teo-docx-tables.py"
      - "scripts/validate-teo-docx-tables.py"
      - "scripts/teo_tables_graph.py"
      - "scripts/build-full-teo-graph.py"
      - "graphify-out/graph.json"
      - "graphify-out/manifest.json"
  push:
    branches: [main]
    paths:
      - "docs/teo-tables/**"
      - "scripts/extract-teo-docx-tables.py"
      - "scripts/validate-teo-docx-tables.py"

jobs:
  validate-tables:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate extracted tables vs docx
        run: python3 scripts/validate-teo-docx-tables.py

      - name: KPI build smoke test
        run: python3 scripts/build-teo-kpi-index.py
