# Сценарий: замена кролиководства на птицеводство (черновик для what-if)
# NPV/CAPEX — оценочные, требуют пересчёта финмодели ТЭО
id: poultry-variant
name: Птицеводство вместо кролиководства
status: draft
replaces: кролиководство

project:
  investment_bln_rub: 105
  revenue_bln_rub_year: 74.0
  note: "+5 млрд CAPEX птицы, +2.6 млрд выручки (оценка)"

blocks:
  кролиководство:
    label: Кролиководство
    active: false
    replaced_by: птицеводство

  птицеводство:
    label: Птицеводство (утка, перепёл, бройлер, индейка)
    active: true
    output: "~12 000 т мяса птицы/год (оценка)"
    capex_bln_rub: 17
    npv_thousand_rub: 4200000
    irr_pct: 18.5
    payback_months: 72
    equipment: "TBD — бройлерные/утиные линии (аналог Gozzini/AIA)"
    slaughter: "Линия птицеубоя на площадке (SINT или аналог)"
    feed: "Комбикормовый завод — рецепты для птиц (03-proizvodstvo)"
    export_hs: "0207 — мясо домашней птицы"
    byproducts: [перья → мясоперьевая мука, помёт → биогаз]
    graph_nodes: [Комбикормовый завод, Убойный цех, Экспортный кластер]
    risks:
      - Конкуренция с федеральными бройлерными холдингами
      - Слабее связь с моделью нулевой себестоимости (мало кожи/желатина с птицы)
      - Другая ветеринария и биобезопасность

  теплицы:
    active: true
    note: без изменений

  животноводство:
    active: true
    note: без изменений

shared_infrastructure:
  kept:
    - Комбикормовый завод (новые рецепты птица)
    - Убойный цех (модернизация линии)
    - Биогаз (птичий помёт — выше N, иная инженерия)
    - Экспорт HS 0207 (данные в 04-rynok)
  weakened:
    - Модель бесплатного убоя (меньше побочных продуктов с птицы)
    - Meneghin Srl → не используется

graph_impact:
  remove_nodes: [Кролиководство, Meneghin Srl, Кроличий навоз, Мех и шкурка кролика]
  add_nodes: [Птицеводство, Бройлер, Утиное мясо, Перепел, Индейка]
  paths_to_rebuild:
    - "Комбикормовый завод → Птицеводство"
    - "Птицеводство → Убойный цех → Экспорт HS 0207"

sources:
  - docs/scenarios/poultry-variant.md
  - docs/graphify-corpus/04-rynok-i-analitika.md (HS 0207)
