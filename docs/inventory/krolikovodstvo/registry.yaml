# Реестр кролиководства baseline — источник для замены в новом ТЭО
# action_on_replace: replace | adapt | archive | rebuild_index | keep_reference

meta:
  project: МОЯ МЕЧТА
  block_id: кролиководство
  block_label: Кролиководство
  status: active_baseline
  poultry: parked_later
  generated_docx_dir: docs/inventory/krolikovodstvo/docx

canonical_facts:
  output_t_per_year: 7000
  heads_million: 6
  workshops_total: 81
  workshops_rabbit: 69
  capex_bln_rub: 12
  npv_thousand_rub: 2779519
  irr_pct: 15.19
  payback_months: 84
  price_rub_per_kg: 560
  manure_t_per_year: 43800
  slaughter_heads_per_hour: 2400
