    expect: ["крол", "FAOSTAT"]
    expected_mode: hybrid
    tags: [rabbit, inventory, market]
    sync_teo_queries: true
  - id: inv_q06
    query: "FRAGOLA корм кролик"
    expect: ["FRAGOLA"]
    expected_mode: hybrid
    tags: [rabbit, inventory, feed]
    sync_teo_queries: true
  - id: inv_q07
    query: "Оценка доброкачественности мяса кролика"
    expect: ["доброкачествен"]
    expected_mode: hybrid
    tags: [rabbit, inventory, processing]
    sync_teo_queries: true
  - id: inv_q08
    query: "BusinesStat цены крольчатины"
    expect: ["BusinesStat", "крол"]
    mode: hybrid
    expected_mode: hybrid
    tags: [rabbit, inventory, market]
    sync_teo_queries: true
  - id: inv_q09
    query: "навоз кроликов 43800"
    expect: ["43 800", "навоз"]
