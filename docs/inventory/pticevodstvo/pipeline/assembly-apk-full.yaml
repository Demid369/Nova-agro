      exclude_headings:
        - "Мировой рынок крольчатины"

  - id: corpus_production_apk
    title: "Corpus — производство blocks 2–5 (без кроликов)"
    section_ref: "corpus §3"
    action: adapt
    sources:
      - file: docs/graphify-corpus/03-proizvodstvo-i-tehnologii.md
    patch:
      exclude_headings:
        - "Кролики: особенности содержания и разведения"
        - "Табл. 141. Рецепты комбикормов для кроликов"

  - id: corpus_finance_text
    title: "Corpus — финансы (текст §10–11 baseline)"
    section_ref: "corpus §5"
    action: baseline_as_is
    sources:
      - file: docs/graphify-corpus/05-finansy-i-byudzhet.md

  - id: corpus_risks_framework
    title: "Corpus — framework рисков baseline"
    section_ref: "corpus §6"
    action: baseline_as_is
    note: "§12 блока птицы — appendix/06-vyvody-i-riski (выше)"
    sources:
      - file: docs/graphify-corpus/06-vyvody-i-riski.md

appendix_sections:
