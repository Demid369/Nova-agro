    action: adapt
    sources:
      - file: docs/graphify-corpus/00-summary.md

  - id: corpus_market_apk
    title: "Corpus — рынок APK-wide (без крольчатины)"
    section_ref: "corpus §4"
    action: adapt
    note: "Patch: skip «Мировой рынок крольчатины»; блок 1 — T09/T12 выше"
    sources:
      - file: docs/graphify-corpus/04-rynok-i-analitika.md
