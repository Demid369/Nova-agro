  санитарно_защитная_зона: 120            # оценка; уточняется при проектировании
  поля_под_помет_комpost: 100             # оценка
  резерв_расширение: 90                   # остаток до 400

byproducts_canon:
  organic_input: помёт птицы
  fertilizer_t_per_year: 43800
  compost_capacity_t_per_hour: 5.0
  solar_mwh: 10
  aligned_with: docs/teo-poultry/energy-budget.yaml

note: >
  Базовая площадь APK 250 000 га (Запорожская область). Слот блока 400 га; участок не выделен —
  кадастр, схема размещения и разрешительная база будут позже. CAPEX и 118 птичников не зависят
  от выбора 150 vs 400 га внутри слота. Встройка 12 млрд в контур 100 млрд: apk-100bln-integration.md.
